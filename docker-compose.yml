
services:
  postgres:
    image: postgres:15
    container_name: postgres
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - scraper_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  airflow_webserver:
    image: apache/airflow:2.7.3-python3.10
    container_name: airflow-webserver
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      airflow_scheduler:
        condition: service_started
    env_file:
      - .env
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}
      - AIRFLOW__CORE__FERNET_KEY=${FERNET_KEY:-9nZunqm9OqSCq5uG4xGvTeeYJL9XBVuG_pKjbp-zwmM=}
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/dags
      - _PIP_ADDITIONAL_REQUIREMENTS=beautifulsoup4 psycopg2-binary rapidfuzz python-dotenv
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./src/linkedin_market_analysis/scraper:/opt/airflow/scraper
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8880:8080"
    command: webserver
    healthcheck:
      test: ["CMD-SHELL", "[ -f /opt/airflow/airflow-webserver.pid ]"]
      interval: 30s
      timeout: 30s
      retries: 3
    networks:
      - scraper_network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  airflow_scheduler:
    image: apache/airflow:2.7.3-python3.10
    container_name: airflow-scheduler
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}
      - AIRFLOW__CORE__FERNET_KEY=${FERNET_KEY:-9nZunqm9OqSCq5uG4xGvTeeYJL9XBVuG_pKjbp-zwmM=}
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/dags
      - _PIP_ADDITIONAL_REQUIREMENTS=beautifulsoup4 psycopg2-binary rapidfuzz python-dotenv
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./src/linkedin_market_analysis/scraper:/opt/airflow/scraper
      - /var/run/docker.sock:/var/run/docker.sock
    command: scheduler
    networks:
      - scraper_network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  airflow_init:
    image: apache/airflow:2.7.3-python3.10
    container_name: airflow-init
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - AIRFLOW__CORE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - _PIP_ADDITIONAL_REQUIREMENTS=beautifulsoup4 psycopg2-binary rapidfuzz python-dotenv
    command: >
      bash -c "
      airflow db migrate &&
      airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com
      "
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - scraper_network

volumes:
  pgdata:

networks:
  scraper_network:
    driver: bridge
